{% extends 'results/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0">Confirm Delete</h4>
</div>

<div class="card border-danger" style="max-width: 500px;">
  <div class="card-body">
    <h5 class="text-danger">Are you sure?</h5>
    <p class="text-muted">
      You are about to delete <strong>{{ object }}</strong>.
      This action <strong>cannot be undone</strong> and will also remove all associated results.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
