<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Result System{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f8f9fa;
      }
      .sidebar {
        min-height: 100vh;
        background: #1a1a2e;
      }
      .sidebar a {
        color: #ccc;
        text-decoration: none;
        padding: 10px 16px;
        display: block;
        border-radius: 6px;
        margin: 2px 8px;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background: #378add;
        color: #fff;
      }
      .sidebar .brand {
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        padding: 20px 16px 10px;
      }
      .stat-card {
        border-left: 4px solid;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div class="sidebar col-2 p-0">
        <div class="brand">IOE Results</div>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'student_list' %}">Students</a>
        <a href="{% url 'add_student' %}">Add Student</a>
        <a href="{% url 'add_result' %}">Add Result</a>
        <a href="{% url 'search_result' %}">Search</a>
        <hr style="border-color: #444; margin: 10px" />
        <a href="{% url 'logout' %}">Logout</a>
      </div>
      <div class="col-10 p-4">
        {% if messages %} {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
          {{ msg }}<button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>
        {% endfor %} {% endif %} {% block content %}{% endblock %}
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
