<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — IOE Result System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      .login-card { background: #fff; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
      .brand-title { color: #1a1a2e; font-size: 1.6rem; font-weight: 700; }
      .brand-sub { color: #378add; font-size: 0.9rem; margin-bottom: 1.5rem; }
      .btn-primary { background: #378add; border-color: #378add; }
      .btn-primary:hover { background: #2a6db5; border-color: #2a6db5; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="text-center mb-4">
        <div class="brand-title">IOE Results</div>
        <div class="brand-sub">Result Management System</div>
      </div>
      {% if form.errors %}
      <div class="alert alert-danger py-2">Invalid username or password.</div>
      {% endif %}
      {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }} py-2">{{ msg }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required />
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
